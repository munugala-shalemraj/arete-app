<!DOCTYPE html>
<html>
<head>
  <script>
    // Must run FIRST before any other script.
    // Supabase-js calls localStorage.init() internally which crashes on some
    // static hosts. Wrap localStorage in a safe proxy that swallows errors.
    (function() {
      try {
        var _ls = window.localStorage;
        // Test that it actually works (throws in some sandboxed contexts)
        _ls.getItem('__test__');
      } catch(e) {
        // Replace with an in-memory fallback
        var _store = {};
        Object.defineProperty(window, 'localStorage', {
          value: {
            getItem: function(k) { return Object.prototype.hasOwnProperty.call(_store,k) ? _store[k] : null; },
            setItem: function(k, v) { _store[k] = String(v); },
            removeItem: function(k) { delete _store[k]; },
            clear: function() { _store = {}; },
            key: function(i) { return Object.keys(_store)[i] || null; },
            get length() { return Object.keys(_store).length; }
          },
          writable: false
        });
      }
    })();
  </script>

      display: flex;

      align-items: center;
      height: 100vh;
      flex-direction: column;
      color: #C9A84C;
      font-family: sans-serif;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #C9A84C33;
      border-top-color: #C9A84C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading Arete...</span>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
